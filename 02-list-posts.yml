info:
  name: List Posts
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/api/posts"
  params:
    - name: page
      value: "0"
      type: query
    - name: per_page
      value: "5"
      type: query
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

settings:
  encodeUrl: true

docs: |-
  Fetch a paginated list of your posts.

  Adjust `page` and `per_page` query params as needed. The response includes
  platform-level status and insights for each post.
