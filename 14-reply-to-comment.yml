info:
  name: Reply to Comment
  type: http
  seq: 14

http:
  method: POST
  url: "{{base_url}}/api/posts/POST_ID/comments?profile_id=PROFILE_ID"
  body:
    type: json
    data: |-
      {
        "text": "Glad you liked it!",
        "parent_id": "COMMENT_ID"
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

settings:
  encodeUrl: true

docs: |-
  Reply to an existing comment on one of your published posts.

  - Replace `POST_ID` in the URL with the ID of the post.
  - Replace `PROFILE_ID` in the URL with the profile that should post the reply.
  - Replace `"COMMENT_ID"` in `parent_id` with the ID of the comment to reply to.
  - Run **Get Profiles** first to find available profile IDs.

  The reply starts as `"pending"` and transitions to `"published"` once it goes live on the platform.

  Supported platforms: Instagram, Facebook (Threads, YouTube, and LinkedIn coming soon).
