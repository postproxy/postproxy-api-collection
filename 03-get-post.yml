info:
  name: Get Post
  type: http
  seq: 3

http:
  method: GET
  url: "{{base_url}}/api/posts/abc123xyz"
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

settings:
  encodeUrl: true

docs: |-
  Retrieve full details for a single post, including media, platform results,
  and engagement insights.

  Replace `abc123xyz` in the URL with a real post ID from your account.
  You can get post IDs by running the **List Posts** request first.
